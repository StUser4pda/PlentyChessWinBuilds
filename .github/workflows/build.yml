# ──────────────────────────────────────────────────────────────────────────────
# PlentyChess – Windows x64 multi-arch build (MSYS2 CLANG64)
#
# Checks out Yoshie2000/PlentyChess directly; intended to run from any repo.
#
# 1. generate-pgo: Builds an instrumented AVX2 binary, generates PGO profile,
#                  and processes the NNUE network (runs once).
# 2. build: Downloads profile/net, compiles statically-linked executables with
#           full LTO + PGO for 6 architectures (runs in parallel).
# ──────────────────────────────────────────────────────────────────────────────

name: Build PlentyChess — Windows x64

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit to build. If empty - build current.'
        required: false
        default: ''   

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. PGO & Network Generation ─────────────────────────────────────────────
  generate-pgo:
    name: Generate PGO Profile
    runs-on: windows-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    
    steps:
      - name: Checkout Yoshie2000/PlentyChess
        uses: actions/checkout@v4
        with:
          repository: Yoshie2000/PlentyChess
          ref: ${{ inputs.commit }}
          submodules: recursive

      - name: Get PlentyChess short commit SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          cache: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            make
            curl

      - name: Download and process NNUE network (arch=generic)
        shell: msys2 {0}
        run: make process-net arch=generic CXX=clang++

      - name: Build instrumented binary & collect profile
        shell: msys2 {0}
        run: |
          make -j$(nproc) _nopgo \
            arch=avx2 CXX=clang++ EXE=pgo_instr.exe SKIP_PROCESS_NET=true \
            CXXFLAGS_EXTRA="-fprofile-instr-generate"
          
          ./pgo_instr.exe bench
          llvm-profdata merge -output=default.profdata default.profraw

      - name: Upload PGO Profile and Network
        uses: actions/upload-artifact@v4
        with:
          name: pgo-and-net
          path: |
            default.profdata
            processed.bin
          retention-days: 1

  # ── 2. Per-architecture build ───────────────────────────────────────────────
  build:
    name: Windows x64 · ${{ matrix.arch }}
    needs: generate-pgo
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: avx512vbmi2
            exe:  PlentyChess-x64-avx512vbmi2
          - arch: avx512
            exe:  PlentyChess-x64-avx512
          - arch: bmi2
            exe:  PlentyChess-x64-bmi2
          - arch: avx2
            exe:  PlentyChess-x64-avx2
          - arch: ssse3
            exe:  PlentyChess-x64-ssse3
          - arch: generic
            exe:  PlentyChess-x64-generic

    steps:
      - name: Checkout Yoshie2000/PlentyChess
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
          repository: Yoshie2000/PlentyChess
          submodules: recursive

      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          cache: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            make

      - name: Download PGO Profile and Network
        uses: actions/download-artifact@v4
        with:
          name: pgo-and-net
          path: .

      - name: Build ${{ matrix.exe }}.exe
        shell: msys2 {0}
        run: |
          EXE="${{ matrix.exe }}-${{ needs.generate-pgo.outputs.sha }}.exe"
          
          # Build with LTO and the downloaded profile data
          make -j$(nproc) _nopgo \
            arch=${{ matrix.arch }} CXX=clang++ EXE="$EXE" SKIP_PROCESS_NET=true \
            CXXFLAGS_EXTRA="-flto=full -fprofile-instr-use=default.profdata"

      - name: Strip debug symbols
        shell: msys2 {0}
        run: llvm-strip ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.sha }}.exe

      - name: Package Release
        shell: msys2 {0}
        run: |
          # Package the executable and the required network file together
          mkdir release
          mv ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.sha }}.exe release/
          cp processed.bin release/

      - name: Upload artifact · ${{ matrix.exe }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
