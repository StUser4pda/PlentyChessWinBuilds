# ──────────────────────────────────────────────────────────────────────────────
# PlentyChess – Windows x64 multi-arch build (MSYS2 CLANG64)
#
# Checks out Yoshie2000/PlentyChess directly; intended to run from any repo.
#
# Produces six statically-linked executables (all with ThinLTO via -flto=thin):
#   PlentyChess-x64-avx512vbmi2.exe   (icelake-client / VBMI2 + BMI2) — LTO
#   PlentyChess-x64-avx512.exe        (skylake-avx512  / BMI2)         — LTO
#   PlentyChess-x64-bmi2.exe          (haswell / BMI2, no AVX-512)     — LTO + PGO
#   PlentyChess-x64-avx2.exe          (haswell / AVX2)                 — LTO + PGO
#   PlentyChess-x64-ssse3.exe         (SSSE3 baseline)                 — LTO + PGO
#   PlentyChess-x64-generic.exe       (no SIMD extensions)             — LTO + PGO
#
# LTO note: the Makefile only enables -flto=auto on Windows for MSVC-target
# clang (clang-cl). MSYS2 CLANG64 targets x86_64-w64-mingw32, so the
# Makefile's LTO branch is never taken. Instead, -flto=thin is injected via
# CFLAGS/CXXFLAGS/LDFLAGS env vars on the build step — the Makefile's own
# $(CXXFLAGS) / $(LDFLAGS) := expansions pick them up at parse time.
#
# AVX-512 targets use `make all` (LTO, no PGO) because the free GitHub-hosted
# Windows runners (Azure AMD EPYC) do not expose AVX-512 to guest VMs.
# Running the instrumented bench binary would SIGILL, breaking profile-build.
# All other targets use `make profile-build` (full PGO).
# ──────────────────────────────────────────────────────────────────────────────

name: Build PlentyChess — Windows x64

on:
  workflow_dispatch:

# Cancel redundant in-progress runs triggered manually.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Per-architecture build ──────────────────────────────────────────────────
  build:
    name: Windows x64 · ${{ matrix.arch }}
    runs-on: windows-latest

    strategy:
      fail-fast: false          # keep building the other targets if one fails
      matrix:
        include:
          # ── arch ──────────── make target ─── note ───────────────────────
          - arch: avx512vbmi2
            target: all             # no PGO — AVX-512 won't run on free runners; LTO via env
            exe:    PlentyChess-x64-avx512vbmi2

          - arch: avx512
            target: all             # no PGO — AVX-512 won't run on free runners; LTO via env
            exe:    PlentyChess-x64-avx512

          - arch: bmi2
            target: profile-build   # PGO — haswell ISA runs fine on free runners
            exe:    PlentyChess-x64-bmi2

          - arch: avx2
            target: profile-build   # PGO
            exe:    PlentyChess-x64-avx2

          - arch: ssse3
            target: profile-build   # PGO
            exe:    PlentyChess-x64-ssse3

          - arch: generic
            target: profile-build   # PGO
            exe:    PlentyChess-x64-generic

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Yoshie2000/PlentyChess
        uses: actions/checkout@v4
        with:
          repository: Yoshie2000/PlentyChess
          submodules: recursive   # fathom (tablebase) lives in a submodule

      - name: Get PlentyChess short commit SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── 2. MSYS2 CLANG64 environment ────────────────────────────────────────
      #    mingw-w64-clang-x86_64-toolchain  →  clang++, llvm-profdata, lld
      #    make                              →  GNU make
      #    curl                              →  network download in Makefile
      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            make
            curl

      # ── 3. Network ───────────────────────────────────────────────────────────
      #    The tools sub-make inherits arch= from the parent, so building with
      #    avx512/avx512vbmi2 compiles process_net with -march=skylake-avx512 /
      #    -march=icelake-client and it SIGILLs immediately on free runners.
      #    Fix: always process the network with arch=generic (safe on any CPU),
      #    then pass SKIP_PROCESS_NET=true to the engine build so it never
      #    re-enters the tools sub-make regardless of target arch.
      - name: Download and process NNUE network (arch=generic)
        shell: msys2 {0}
        run: make process-net arch=generic CXX=clang++

      # ── 4. Compile ───────────────────────────────────────────────────────────
      - name: Build ${{ matrix.exe }}.exe
        shell: msys2 {0}
        run: |
          # Define maximum optimization flags
          OPT_FLAGS="-flto -fno-plt"
          
          if [[ "${{ matrix.target }}" == "all" ]]; then
            # --- For AVX-512 targets (Normally skip PGO) ---
            echo "Performing Cross-Architecture PGO for AVX-512..."
            
            # 1. Build an instrumented generic binary that CAN run on this host
            make clean
            make -j$(nproc) _pgo arch=generic CXX="clang++ $OPT_FLAGS" CC="clang $OPT_FLAGS" EXE=pgo_gen.exe SKIP_PROCESS_NET=true
            
            # 2. Now that default.profdata is generated, compile the final AVX-512 binary using it!
            make clean
            make -j$(nproc) _nopgo arch=${{ matrix.arch }} CXX="clang++ $OPT_FLAGS" CC="clang $OPT_FLAGS" CXXFLAGS_EXTRA="-fprofile-instr-use=default.profdata" EXE=${{ matrix.exe }}-${{ steps.sha.outputs.short }}.exe SKIP_PROCESS_NET=true
            
          else
            # --- For regular targets (bmi2, avx2, ssse3, generic) ---
            make -j$(nproc) ${{ matrix.target }} \
              arch=${{ matrix.arch }} \
              CXX="clang++ $OPT_FLAGS" \
              CC="clang $OPT_FLAGS" \
              LDFLAGS="-flto" \
              EXE=${{ matrix.exe }}-${{ steps.sha.outputs.short }}.exe \
              SKIP_PROCESS_NET=true
          fi     

      # ── 5. Strip debug symbols ───────────────────────────────────────────────
      - name: Strip ${{ matrix.exe }}.exe
        shell: msys2 {0}
        run: llvm-strip ${{ matrix.exe }}-${{ steps.sha.outputs.short }}.exe

      # ── 6. Quick sanity check ────────────────────────────────────────────────
      #    Runs after strip — verifies the binary still executes correctly.
      #    Skip for AVX-512 builds that may not run on this runner.
      - name: Smoke-test ${{ matrix.exe }}.exe
        shell: msys2 {0}
        if: ${{ !startsWith(matrix.arch, 'avx512') }}
        run: ./${{ matrix.exe }}-${{ steps.sha.outputs.short }}.exe bench 2>&1 | tail -5

      # ── 7. Upload per-arch artifact ──────────────────────────────────────────
      - name: Upload artifact · ${{ matrix.exe }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe }}-${{ steps.sha.outputs.short }}
          path: ${{ matrix.exe }}-${{ steps.sha.outputs.short }}.exe
          if-no-files-found: error
          retention-days: 30

  # ── Bundle all binaries into one artifact ───────────────────────────────────
  bundle:
    name: Bundle all Windows x64 binaries
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all per-arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true   # flatten into a single directory

      - name: List collected binaries
        run: ls -lh binaries/

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlentyChess-Windows-x64-all
          path: binaries/*.exe
          if-no-files-found: error
          retention-days: 30
