# ──────────────────────────────────────────────────────────────────────────────
# PlentyChess – Windows x64 multi-arch build (MSYS2 CLANG64)
#
# 1. generate-pgo: Builds an instrumented AVX2 binary and generates the PGO profile.
# 2. build: For each architecture, emulates process_net via Intel SDE to generate
#           the correct memory layout, then compiles the static executable.
# ──────────────────────────────────────────────────────────────────────────────

name: Build PlentyChess — Windows x64

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit to build. If empty - build current.'
        required: false
        default: ''   

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. PGO Generation ───────────────────────────────────────────────────────
  generate-pgo:
    name: Generate PGO Profile
    runs-on: windows-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
      version: ${{ steps.version.outputs.ver }}
    
    steps:
      - name: Checkout Yoshie2000/PlentyChess
        uses: actions/checkout@v4
        with:
          repository: Yoshie2000/PlentyChess
          ref: ${{ inputs.commit }}
          submodules: recursive

      - name: Get PlentyChess short commit SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get PlentyChess version
        id: version
        shell: bash
        run: echo "ver=$(grep -oP '(?<=VERSION = ")[^"]+' src/uci.h)" >> "$GITHUB_OUTPUT"

      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          cache: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            make
            curl

      - name: Download and process temporary network
        shell: msys2 {0}
        run: |
          # Generic layout is sufficient just to run the bench command for PGO
          make process-net arch=generic CXX=clang++

      - name: Build instrumented binary & collect profile
        shell: msys2 {0}
        run: |
          make -j$(nproc) _nopgo \
            arch=bmi2 CXX=clang++ EXE=pgo_instr.exe SKIP_PROCESS_NET=true \
            CXXFLAGS_EXTRA="-fprofile-instr-generate"
          
          # Run the engine to generate profiling data
          ./pgo_instr.exe bench
          llvm-profdata merge -output=default.profdata default.profraw

      - name: Upload PGO Profile
        uses: actions/upload-artifact@v4
        with:
          name: pgo-data
          path: default.profdata
          retention-days: 1

  # ── 2. Per-architecture build ───────────────────────────────────────────────
  build:
    name: Windows x64 · ${{ matrix.arch }}
    needs: generate-pgo
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: avx512vbmi2
            exe:  PlentyChess-x64-avx512vbmi2
          - arch: avx512
            exe:  PlentyChess-x64-avx512
          - arch: bmi2
            exe:  PlentyChess-x64-bmi2
          - arch: avx2
            exe:  PlentyChess-x64-avx2
          - arch: ssse3
            exe:  PlentyChess-x64-ssse3
          - arch: generic
            exe:  PlentyChess-x64-generic

    steps:
      - name: Checkout Yoshie2000/PlentyChess
        uses: actions/checkout@v4
        with:
          repository: Yoshie2000/PlentyChess
          ref: ${{ inputs.commit }}
          submodules: recursive

      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          cache: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            make
            curl
            xz

      - name: Download PGO Profile
        uses: actions/download-artifact@v4
        with:
          name: pgo-data
          path: .

      - name: Install dependencies and unpack Intel SDE
        shell: msys2 {0}
        run: |
          # Download
          curl -L -o sde.tar.xz https://downloadmirror.intel.com/859732/sde-external-9.58.0-2025-06-16-win.tar.xz
          
          # Extract (tar will now find the 'xz' utility in the path)
          tar -xf sde.tar.xz
          mv sde-external-*/ sde/
          
      - name: Generate architecture-specific network
        shell: msys2 {0}
        run: |
          NET_ID=$(cat network.txt)
          curl -sOL "https://github.com/Yoshie2000/PlentyNetworks/releases/download/${NET_ID}/${NET_ID}.bin"
          
          # Compile the tool for the specific architecture
          make -C tools clean
          make -C tools arch=${{ matrix.arch }} CXX=clang++
          
          # Execute through SDE to bypass SIGILL on AVX-512 builds
          ./sde/sde.exe -future -- ./tools/process_net false "${NET_ID}.bin" processed.bin

      - name: Build ${{ matrix.exe }}.exe
        shell: msys2 {0}
        run: |
          EXE="${{ matrix.exe }}-${{ needs.generate-pgo.outputs.version }}-${{ needs.generate-pgo.outputs.sha }}.exe"
          
          # Pass SKIP_PROCESS_NET=true so the Makefile doesn't overwrite our SDE-generated processed.bin
          make -j$(nproc) _nopgo \
            arch=${{ matrix.arch }} CXX=clang++ EXE="$EXE" SKIP_PROCESS_NET=true \
            CXXFLAGS_EXTRA="-flto=full -fprofile-instr-use=default.profdata"

      - name: Strip debug symbols
        shell: msys2 {0}
        run: llvm-strip ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.version }}-${{ needs.generate-pgo.outputs.sha }}.exe

      - name: Package Release
        shell: msys2 {0}
        run: |
          mkdir release
          mv ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.version }}-${{ needs.generate-pgo.outputs.sha }}.exe release/

      - name: Upload artifact · ${{ matrix.exe }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe }}-${{ needs.generate-pgo.outputs.version }}-${{ needs.generate-pgo.outputs.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
